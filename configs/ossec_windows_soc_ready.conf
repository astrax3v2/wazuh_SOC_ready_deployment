<!--
Production-grade Wazuh Agent ossec.conf - Windows
Purpose: SOC security monitoring with stable agent connectivity and rich Windows telemetry.

Replace:
  WAZUH_MANAGER_FQDN_OR_IP
  GROUP_NAME_OR_PROFILE if needed

Path:
  C:\Program Files (x86)\ossec-agent\ossec.conf

After change:
  Restart-Service WazuhSvc
-->

<ossec_config>

  <!-- ========================================================= -->
  <!-- 1. Agent to Manager Connectivity                          -->
  <!-- ========================================================= -->
  <client>
    <server>
      <address>WAZUH_MANAGER_FQDN_OR_IP</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>

    <!-- Keepalive and reconnect tuning -->
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>

    <!-- Optional: useful when using centralized groups -->
    <config-profile>windows,soc</config-profile>
  </client>

  <!-- Agent buffer: reduces event loss during temporary network or manager issues -->
  <client_buffer>
    <disabled>no</disabled>
    <queue_size>5000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>

  <!-- ========================================================= -->
  <!-- 2. Core Windows Event Logs                                -->
  <!-- ========================================================= -->
  <localfile>
    <location>Security</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>System</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>Application</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========================================================= -->
  <!-- 3. PowerShell Monitoring                                  -->
  <!-- Requires PowerShell Script Block and Module Logging        -->
  <!-- ========================================================= -->
  <localfile>
    <location>Microsoft-Windows-PowerShell/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>Windows PowerShell</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========================================================= -->
  <!-- 4. Sysmon Monitoring                                      -->
  <!-- Requires Sysmon installed with a production config         -->
  <!-- ========================================================= -->
  <localfile>
    <location>Microsoft-Windows-Sysmon/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========================================================= -->
  <!-- 5. Microsoft Defender / AV Monitoring                      -->
  <!-- ========================================================= -->
  <localfile>
    <location>Microsoft-Windows-Windows Defender/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>Microsoft-Windows-Windows Defender/WHC</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========================================================= -->
  <!-- 6. RDP / Remote Access Monitoring                         -->
  <!-- ========================================================= -->
  <localfile>
    <location>Microsoft-Windows-TerminalServices-LocalSessionManager/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>Microsoft-Windows-TerminalServices-RemoteConnectionManager/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>Microsoft-Windows-RemoteDesktopServices-RdpCoreTS/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========================================================= -->
  <!-- 7. Task Scheduler / Persistence Monitoring                -->
  <!-- ========================================================= -->
  <localfile>
    <location>Microsoft-Windows-TaskScheduler/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========================================================= -->
  <!-- 8. WMI / WinRM / Lateral Movement Monitoring              -->
  <!-- ========================================================= -->
  <localfile>
    <location>Microsoft-Windows-WMI-Activity/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>Microsoft-Windows-WinRM/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>Microsoft-Windows-WinRM/Analytic</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========================================================= -->
  <!-- 9. AppLocker / Application Control Monitoring             -->
  <!-- Enable AppLocker policies before expecting events          -->
  <!-- ========================================================= -->
  <localfile>
    <location>Microsoft-Windows-AppLocker/EXE and DLL</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>Microsoft-Windows-AppLocker/MSI and Script</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>Microsoft-Windows-AppLocker/Packaged app-Deployment</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>Microsoft-Windows-AppLocker/Packaged app-Execution</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========================================================= -->
  <!-- 10. Windows Firewall Monitoring                           -->
  <!-- ========================================================= -->
  <localfile>
    <location>Microsoft-Windows-Windows Firewall With Advanced Security/Firewall</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- Optional flat firewall log if enabled in Windows Firewall settings -->
  <localfile>
    <location>C:\Windows\System32\LogFiles\Firewall\pfirewall.log</location>
    <log_format>syslog</log_format>
  </localfile>

  <!-- ========================================================= -->
  <!-- 11. DNS Client / Operational Monitoring                    -->
  <!-- Useful for endpoint DNS visibility                         -->
  <!-- ========================================================= -->
  <localfile>
    <location>Microsoft-Windows-DNS-Client/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========================================================= -->
  <!-- 12. Windows Update / Reliability Monitoring                -->
  <!-- ========================================================= -->
  <localfile>
    <location>Microsoft-Windows-WindowsUpdateClient/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========================================================= -->
  <!-- 13. Certificate / Crypto Monitoring                        -->
  <!-- Useful for ADCS/client cert visibility                     -->
  <!-- ========================================================= -->
  <localfile>
    <location>Microsoft-Windows-CertificateServicesClient-Lifecycle-System/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>Microsoft-Windows-CAPI2/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ========================================================= -->
  <!-- 14. Optional Domain Controller Logs                        -->
  <!-- Keep these on Domain Controllers only                      -->
  <!-- ========================================================= -->
  <!--
  <localfile>
    <location>Directory Service</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>DNS Server</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>DFS Replication</location>
    <log_format>eventchannel</log_format>
  </localfile>
  -->

  <!-- ========================================================= -->
  <!-- 15. Wazuh Agent Internal Logs                              -->
  <!-- ========================================================= -->
  <localfile>
    <location>C:\Program Files (x86)\ossec-agent\ossec.log</location>
    <log_format>syslog</log_format>
  </localfile>

  <!-- ========================================================= -->
  <!-- 16. File Integrity Monitoring                              -->
  <!-- Tune realtime paths carefully on busy servers              -->
  <!-- ========================================================= -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <auto_ignore>no</auto_ignore>
    <alert_new_files>yes</alert_new_files>

    <!-- Critical system and persistence paths -->
    <directories check_all="yes" realtime="yes">C:\Windows\System32\drivers\etc</directories>
    <directories check_all="yes" realtime="yes">C:\Windows\System32\Tasks</directories>
    <directories check_all="yes" realtime="yes">C:\ProgramData\Microsoft\Windows\Start Menu\Programs\Startup</directories>
    <directories check_all="yes" realtime="yes">C:\Users\*\AppData\Roaming\Microsoft\Windows\Start Menu\Programs\Startup</directories>
    <directories check_all="yes" realtime="yes">C:\Windows\System32\GroupPolicy</directories>
    <directories check_all="yes" realtime="yes">C:\Windows\SysWOW64\GroupPolicy</directories>

    <!-- Registry persistence and service locations -->
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\Run</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\RunOnce</windows_registry>
    <windows_registry arch="both">HKEY_CURRENT_USER\Software\Microsoft\Windows\CurrentVersion\Run</windows_registry>
    <windows_registry arch="both">HKEY_CURRENT_USER\Software\Microsoft\Windows\CurrentVersion\RunOnce</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Microsoft\Windows NT\CurrentVersion\Image File Execution Options</windows_registry>
    <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Microsoft\Windows NT\CurrentVersion\Winlogon</windows_registry>

    <!-- Noise exclusions -->
    <ignore>C:\Windows\Temp</ignore>
    <ignore>C:\Windows\Prefetch</ignore>
    <ignore>C:\ProgramData\Microsoft\Windows Defender\Scans</ignore>
    <ignore type="sregex">.log$|.tmp$|.etl$</ignore>
  </syscheck>

  <!-- ========================================================= -->
  <!-- 17. Rootcheck / Malware Indicators                         -->
  <!-- ========================================================= -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
  </rootcheck>

  <!-- ========================================================= -->
  <!-- 18. Security Configuration Assessment                      -->
  <!-- ========================================================= -->
  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
  </sca>

  <!-- ========================================================= -->
  <!-- 19. System Inventory / Vulnerability Data                  -->
  <!-- ========================================================= -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="no">yes</ports>
    <processes>yes</processes>
    <hotfixes>yes</hotfixes>
  </wodle>

  <!-- ========================================================= -->
  <!-- 20. Active Response Baseline                              -->
  <!-- Keep enabled but only deploy tested responses from manager -->
  <!-- ========================================================= -->
  <active-response>
    <disabled>no</disabled>
  </active-response>

</ossec_config>
