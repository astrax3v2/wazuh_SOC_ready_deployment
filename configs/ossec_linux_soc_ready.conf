<!--
Production-grade Wazuh Agent ossec.conf - Linux
Purpose: SOC security monitoring with stable connectivity, Linux auth/audit logs,
web/database log paths, FIM, SCA, and syscollector.

Replace:
  WAZUH_MANAGER_FQDN_OR_IP

Path:
  /var/ossec/etc/ossec.conf

After change:
  sudo systemctl restart wazuh-agent
-->

<ossec_config>

  <!-- ========================================================= -->
  <!-- 1. Agent to Manager Connectivity                          -->
  <!-- ========================================================= -->
  <client>
    <server>
      <address>WAZUH_MANAGER_FQDN_OR_IP</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>

    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>

    <config-profile>linux,soc</config-profile>
  </client>

  <client_buffer>
    <disabled>no</disabled>
    <queue_size>5000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>

  <!-- ========================================================= -->
  <!-- 2. Core Linux OS Logs                                     -->
  <!-- Debian/Ubuntu and RHEL-like paths included. Non-existing   -->
  <!-- paths are skipped, but remove irrelevant ones for neatness. -->
  <!-- ========================================================= -->

  <!-- Debian/Ubuntu -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/kern.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/daemon.log</location>
  </localfile>

  <!-- RHEL/CentOS/Rocky/Alma -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/messages</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/secure</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/cron</location>
  </localfile>

  <!-- Optional if present -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/maillog</location>
  </localfile>

  <!-- ========================================================= -->
  <!-- 3. Auditd Logs                                            -->
  <!-- Requires auditd installed and audit rules loaded           -->
  <!-- ========================================================= -->
  <localfile>
    <log_format>audit</log_format>
    <location>/var/log/audit/audit.log</location>
  </localfile>

  <!-- ========================================================= -->
  <!-- 4. Journald Collection                                    -->
  <!-- Use this if your Linux distro relies heavily on journald.  -->
  <!-- If too noisy, disable and use rsyslog flat files instead.  -->
  <!-- ========================================================= -->
  <localfile>
    <log_format>journald</log_format>
    <location>journald</location>
  </localfile>

  <!-- ========================================================= -->
  <!-- 5. SSH / Authentication Related Logs                       -->
  <!-- Already covered by auth.log/secure, but include common app -->
  <!-- logs where available.                                     -->
  <!-- ========================================================= -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/faillog</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/lastlog</location>
  </localfile>

  <!-- ========================================================= -->
  <!-- 6. Package Management Logs                                -->
  <!-- ========================================================= -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/dpkg.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/apt/history.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/yum.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/dnf.log</location>
  </localfile>

  <!-- ========================================================= -->
  <!-- 7. Web Server Logs                                        -->
  <!-- ========================================================= -->
  <!-- Apache Debian/Ubuntu -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/access.log</location>
  </localfile>

  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/error.log</location>
  </localfile>

  <!-- Apache RHEL -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/httpd/access_log</location>
  </localfile>

  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/httpd/error_log</location>
  </localfile>

  <!-- Nginx -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/nginx/access.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/nginx/error.log</location>
  </localfile>

  <!-- ========================================================= -->
  <!-- 8. Database Logs                                          -->
  <!-- Enable only on database servers. Adjust exact paths.       -->
  <!-- ========================================================= -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/mysql/error.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/mariadb/mariadb.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/postgresql/postgresql-*.log</location>
  </localfile>

  <!-- ========================================================= -->
  <!-- 9. Container / Docker Logs                                -->
  <!-- Enable on Docker/container hosts.                         -->
  <!-- ========================================================= -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/docker.log</location>
  </localfile>

  <localfile>
    <log_format>json</log_format>
    <location>/var/lib/docker/containers/*/*-json.log</location>
  </localfile>

  <!-- ========================================================= -->
  <!-- 10. Firewall Logs                                         -->
  <!-- ========================================================= -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/ufw.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/firewalld</location>
  </localfile>

  <!-- ========================================================= -->
  <!-- 11. Wazuh Agent Internal Log                              -->
  <!-- ========================================================= -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/ossec/logs/ossec.log</location>
  </localfile>

  <!-- ========================================================= -->
  <!-- 12. File Integrity Monitoring                             -->
  <!-- Be careful with realtime on very busy directories.         -->
  <!-- ========================================================= -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <auto_ignore>no</auto_ignore>
    <alert_new_files>yes</alert_new_files>

    <!-- Identity, auth, and privilege -->
    <directories check_all="yes" realtime="yes">/etc/passwd</directories>
    <directories check_all="yes" realtime="yes">/etc/shadow</directories>
    <directories check_all="yes" realtime="yes">/etc/group</directories>
    <directories check_all="yes" realtime="yes">/etc/gshadow</directories>
    <directories check_all="yes" realtime="yes">/etc/sudoers</directories>
    <directories check_all="yes" realtime="yes">/etc/sudoers.d</directories>

    <!-- SSH and access control -->
    <directories check_all="yes" realtime="yes">/etc/ssh</directories>
    <directories check_all="yes" realtime="yes">/root/.ssh</directories>

    <!-- Persistence paths -->
    <directories check_all="yes" realtime="yes">/etc/crontab</directories>
    <directories check_all="yes" realtime="yes">/etc/cron.d</directories>
    <directories check_all="yes" realtime="yes">/etc/cron.daily</directories>
    <directories check_all="yes" realtime="yes">/etc/cron.hourly</directories>
    <directories check_all="yes" realtime="yes">/etc/cron.weekly</directories>
    <directories check_all="yes" realtime="yes">/etc/systemd/system</directories>
    <directories check_all="yes" realtime="yes">/lib/systemd/system</directories>
    <directories check_all="yes" realtime="yes">/usr/lib/systemd/system</directories>

    <!-- Binaries and boot -->
    <directories check_all="yes">/bin</directories>
    <directories check_all="yes">/sbin</directories>
    <directories check_all="yes">/usr/bin</directories>
    <directories check_all="yes">/usr/sbin</directories>
    <directories check_all="yes">/boot</directories>

    <!-- Web roots: enable only on web servers -->
    <directories check_all="yes" realtime="yes">/var/www</directories>

    <!-- Exclusions -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/random.seed</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/httpd/logs</ignore>
    <ignore>/etc/utmpx</ignore>
    <ignore>/etc/wtmpx</ignore>
    <ignore>/etc/cups/certs</ignore>
    <ignore>/etc/dumpdates</ignore>
    <ignore>/var/log</ignore>
    <ignore>/var/cache</ignore>
    <ignore>/var/tmp</ignore>
    <ignore>/tmp</ignore>
    <ignore type="sregex">.log$|.swp$|.tmp$|.pid$</ignore>
  </syscheck>

  <!-- ========================================================= -->
  <!-- 13. Rootcheck                                             -->
  <!-- ========================================================= -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
  </rootcheck>

  <!-- ========================================================= -->
  <!-- 14. Security Configuration Assessment                     -->
  <!-- ========================================================= -->
  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
  </sca>

  <!-- ========================================================= -->
  <!-- 15. System Inventory / Vulnerability Data                 -->
  <!-- ========================================================= -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="no">yes</ports>
    <processes>yes</processes>
  </wodle>

  <!-- ========================================================= -->
  <!-- 16. Command Monitoring - Lightweight SOC Checks           -->
  <!-- Optional: useful for SOC visibility. Tune frequency.       -->
  <!-- ========================================================= -->
  <localfile>
    <log_format>full_command</log_format>
    <command>last -n 20</command>
    <frequency>3600</frequency>
  </localfile>

  <localfile>
    <log_format>full_command</log_format>
    <command>ss -tulpn</command>
    <frequency>3600</frequency>
  </localfile>

  <!-- ========================================================= -->
  <!-- 17. Active Response Baseline                              -->
  <!-- ========================================================= -->
  <active-response>
    <disabled>no</disabled>
  </active-response>

</ossec_config>
