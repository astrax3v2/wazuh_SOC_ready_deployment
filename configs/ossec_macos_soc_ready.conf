<!--
Production-grade Wazuh Agent ossec.conf - macOS
Purpose: SOC security monitoring with stable connectivity, macOS system/audit logs,
FIM for persistence locations, SCA, syscollector.

Replace:
  WAZUH_MANAGER_FQDN_OR_IP

Path:
  /Library/Ossec/etc/ossec.conf

After change:
  sudo /Library/Ossec/bin/wazuh-control restart
-->

<ossec_config>

  <!-- ========================================================= -->
  <!-- 1. Agent to Manager Connectivity                          -->
  <!-- ========================================================= -->
  <client>
    <server>
      <address>WAZUH_MANAGER_FQDN_OR_IP</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>

    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>

    <config-profile>macos,soc</config-profile>
  </client>

  <client_buffer>
    <disabled>no</disabled>
    <queue_size>5000</queue_size>
    <events_per_second>300</events_per_second>
  </client_buffer>

  <!-- ========================================================= -->
  <!-- 2. macOS System Logs                                      -->
  <!-- Modern macOS uses Unified Logging heavily. These classic   -->
  <!-- flat files are still useful where available.               -->
  <!-- ========================================================= -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/system.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/install.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/wifi.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/fsck_hfs.log</location>
  </localfile>

  <!-- ========================================================= -->
  <!-- 3. macOS Audit Logs                                       -->
  <!-- Requires audit framework enabled/configured                -->
  <!-- ========================================================= -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/audit/current</location>
  </localfile>

  <!-- ========================================================= -->
  <!-- 4. macOS Application and Security Relevant Logs            -->
  <!-- Use carefully; some environments generate high noise.      -->
  <!-- ========================================================= -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/Library/Logs/*.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/Library/Logs/DiagnosticReports/*.crash</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/Library/Logs/CrashReporter/*.log</location>
  </localfile>

  <!-- ========================================================= -->
  <!-- 5. Wazuh Agent Internal Log                               -->
  <!-- ========================================================= -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/Library/Ossec/logs/ossec.log</location>
  </localfile>

  <!-- ========================================================= -->
  <!-- 6. File Integrity Monitoring                              -->
  <!-- Focused on macOS persistence and sensitive paths.          -->
  <!-- ========================================================= -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <auto_ignore>no</auto_ignore>
    <alert_new_files>yes</alert_new_files>

    <!-- System and configuration -->
    <directories check_all="yes" realtime="yes">/etc</directories>
    <directories check_all="yes">/usr/bin</directories>
    <directories check_all="yes">/usr/sbin</directories>
    <directories check_all="yes">/bin</directories>
    <directories check_all="yes">/sbin</directories>

    <!-- macOS persistence locations -->
    <directories check_all="yes" realtime="yes">/Library/LaunchDaemons</directories>
    <directories check_all="yes" realtime="yes">/Library/LaunchAgents</directories>
    <directories check_all="yes" realtime="yes">/System/Library/LaunchDaemons</directories>
    <directories check_all="yes" realtime="yes">/System/Library/LaunchAgents</directories>
    <directories check_all="yes" realtime="yes">/Users/*/Library/LaunchAgents</directories>

    <!-- Startup and login items -->
    <directories check_all="yes" realtime="yes">/Library/StartupItems</directories>
    <directories check_all="yes" realtime="yes">/Library/PrivilegedHelperTools</directories>

    <!-- Security and browser extension visibility -->
    <directories check_all="yes" realtime="yes">/Library/Application Support</directories>
    <directories check_all="yes" realtime="yes">/Users/*/Library/Application Support</directories>

    <!-- SSH and user persistence -->
    <directories check_all="yes" realtime="yes">/private/etc/ssh</directories>
    <directories check_all="yes" realtime="yes">/Users/*/.ssh</directories>

    <!-- Exclusions -->
    <ignore>/private/var/log</ignore>
    <ignore>/private/var/folders</ignore>
    <ignore>/private/tmp</ignore>
    <ignore>/tmp</ignore>
    <ignore>/Library/Caches</ignore>
    <ignore>/Users/*/Library/Caches</ignore>
    <ignore type="sregex">.log$|.tmp$|.swp$|.pid$|.DS_Store$</ignore>
  </syscheck>

  <!-- ========================================================= -->
  <!-- 7. Rootcheck                                              -->
  <!-- ========================================================= -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
  </rootcheck>

  <!-- ========================================================= -->
  <!-- 8. Security Configuration Assessment                      -->
  <!-- ========================================================= -->
  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
  </sca>

  <!-- ========================================================= -->
  <!-- 9. System Inventory / Vulnerability Data                  -->
  <!-- ========================================================= -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="no">yes</ports>
    <processes>yes</processes>
  </wodle>

  <!-- ========================================================= -->
  <!-- 10. Command Monitoring - Lightweight SOC Checks           -->
  <!-- ========================================================= -->
  <localfile>
    <log_format>full_command</log_format>
    <command>last -20</command>
    <frequency>3600</frequency>
  </localfile>

  <localfile>
    <log_format>full_command</log_format>
    <command>netstat -an</command>
    <frequency>3600</frequency>
  </localfile>

  <!-- ========================================================= -->
  <!-- 11. Active Response Baseline                              -->
  <!-- ========================================================= -->
  <active-response>
    <disabled>no</disabled>
  </active-response>

</ossec_config>
